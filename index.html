<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu Te Amo ❤️</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Tela do Presente com Estrelas -->
    <div id="giftScreen" class="gift-screen">
        <div id="starsContainer" class="stars-container"></div>
        <div class="gift-container">
            <div class="gift" id="giftBox">
                <div class="gift-heart">💖</div>
            </div>
        </div>
        <p class="gift-text">Clique no presente! 🎁</p>
    </div>

    <!-- Tela Eu Te Amo -->
    <div id="loveScreen" class="love-screen">
        <div class="love-text" id="loveText">EU TE AMO ❤️</div>
        <div class="question">Você me ama?</div>
        <div class="buttons">
            <button class="btn btn-yes" id="btnYes">SIM 😍</button>
            <button class="btn btn-no" id="btnNo">NÃO 😢</button>
        </div>
    </div>

    <!-- Tela Sim - Felicidade -->
    <div id="happyScreen" class="happy-screen">
        <div class="happy-title">YAAAAY! 🥰❤️</div>
        <div class="doll-happy-container">
            <div class="doll-happy doll1">👩‍❤️‍💋‍👨💃</div>
            <div class="doll-happy doll2">🕺💕👨‍❤️‍💋‍👩</div>
        </div>
        <div class="happy-message">Estamos felizes juntos para sempre! 💕</div>
    </div>

    <!-- Tela Não - Tristeza -->
    <div id="sadScreen" class="sad-screen">
        <div class="sad-title">Por que? 😭💔</div>
        <div class="doll-sad-container">
            <div class="doll-sad doll1">😢👩‍🦰</div>
            <div class="doll-sad doll2">💔👨</div>
            <div class="doll-sad doll3">😭👩</div>
        </div>
        <div class="sad-message">Mas eu vou te amar sempre... 💙</div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
