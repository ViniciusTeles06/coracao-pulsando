<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu Te Amo ❤️</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Tela do Presente com Estrelas -->
    <div id="giftScreen" class="screen gift-screen">
        <div id="starsGift" class="stars-container"></div>
        <div class="gift-container">
            <div class="gift" id="giftBox">
                <div class="gift-heart">💖</div>
            </div>
        </div>
        <p class="gift-text">Clique no presente especial! 🎁</p>
    </div>

    <!-- Tela Eu Te Amo -->
    <div id="loveScreen" class="screen love-screen">
        <div class="love-text" id="loveText">EU TE AMO ❤️</div>
        <div class="question">Você me ama também?</div>
        <div class="buttons">
            <button class="btn btn-yes" id="btnYes">SIM! 😍💕</button>
            <button class="btn btn-no" id="btnNo">NÃO 😢</button>
        </div>
    </div>

    <!-- Tela Sim - Felicidade -->
    <div id="happyScreen" class="screen happy-screen">
        <div class="happy-title">QUE FELICIDADE! 🥰✨</div>
        <div class="doll-happy-container">
            <span class="doll-happy doll-boy">🧑‍❤️‍💋‍🧑💃</span>
            <span class="doll-happy doll-girl">🕺💕🧑‍❤️‍💋‍🧑</span>
        </div>
        <div class="happy-message">Vamos ficar juntos para sempre! 💖</div>
    </div>

    <!-- Tela Não - Tristeza -->
    <div id="sadScreen" class="screen sad-screen">
        <div class="sad-title">Por quê? 😭💔</div>
        <div class="doll-sad-container">
            <span class="doll-sad doll1">😢🧑‍🦰</span>
            <span class="doll-sad doll2">💔🧑</span>
            <span class="doll-sad doll3">😭🧑‍🦳</span>
        </div>
        <div class="sad-message">Mas meu amor por você é eterno... 💙</div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
