<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu Te Amo ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Tela do Presente */
        .gift-screen {
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: bounceBackground 2s infinite;
        }

        @keyframes bounceBackground {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .gift {
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            position: relative;
            border-radius: 20px;
            cursor: pointer;
            animation: jump 1s infinite;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .gift::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 25px solid #f39c12;
        }

        .gift::after {
            content: '🎁';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            75% { transform: translateY(-20px) rotate(-5deg); }
        }

        /* Tela do Eu Te Amo */
        .love-screen {
            background: black;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .love-text {
            font-size: 4rem;
            color: #ff1744;
            text-shadow: 0 0 20px #ff1744;
            animation: pulse 1.5s infinite;
            margin-bottom: 30px;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .question {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .buttons {
            display: flex;
            gap: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
        }

        .btn-no {
            background: linear-gradient(45deg, #636e72, #2d3436);
            color: white;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        /* Corações de fundo */
        .heart {
            position: absolute;
            font-size: 20px;
            animation: float 6s infinite linear;
            opacity: 0.7;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Tela Sim - Felicidade */
        .happy-screen {
            background: linear-gradient(45deg, #00b894, #55a3ff, #ff7675);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .happy-title {
            font-size: 3rem;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            animation: bounce 1s infinite;
            margin-bottom: 50px;
        }

        .flower {
            position: absolute;
            font-size: 40px;
            animation: dance 2s infinite;
        }

        .doll-happy {
            font-size: 60px;
            animation: jumpHappy 1s infinite;
        }

        @keyframes dance {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(10deg) scale(1.1); }
            75% { transform: rotate(-10deg) scale(1.1); }
        }

        @keyframes jumpHappy {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* Tela Não - Tristeza */
        .sad-screen {
            background: linear-gradient(45deg, #2d3436, #636e72);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .sad-title {
            font-size: 3rem;
            color: #74b9ff;
            text-shadow: 0 0 20px rgba(116, 185, 255, 0.8);
            animation: shake 0.5s infinite;
            margin-bottom: 50px;
        }

        .raindrop {
            position: absolute;
            color: #74b9ff;
            font-size: 20px;
            animation: rain 2s linear infinite;
        }

        .doll-sad {
            font-size: 60px;
            animation: cry 1s infinite;
        }

        @keyframes rain {
            0% {
                transform: translateY(-100px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes cry {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Tela do Presente -->
    <div id="giftScreen" class="gift-screen">
        <div class="gift" id="giftBox"></div>
        <p style="color: white; font-size: 1.5rem; margin-top: 30px; animation: fadeIn 2s;">Clique no presente! 🎁</p>
    </div>

    <!-- Tela Eu Te Amo -->
    <div id="loveScreen" class="love-screen">
        <div class="love-text" id="loveText">EU TE AMO ❤️</div>
        <div class="question">Você me ama?</div>
        <div class="buttons">
            <button class="btn btn-yes" id="btnYes">SIM 😍</button>
            <button class="btn btn-no" id="btnNo">NÃO 😢</button>
        </div>
    </div>

    <!-- Tela Sim - Felicidade -->
    <div id="happyScreen" class="happy-screen">
        <div class="happy-title">YAAAAY! 🥰❤️</div>
        <div class="doll-happy">👫💃🕺</div>
        <div style="font-size: 2rem; color: white; margin-top: 30px;">Estamos felizes juntos! 💕</div>
    </div>

    <!-- Tela Não - Tristeza -->
    <div id="sadScreen" class="sad-screen">
        <div class="sad-title">Por que? 😭💔</div>
        <div class="doll-sad">😢👫😢</div>
        <div style="font-size: 2rem; color: #ddd; margin-top: 30px;">Mas eu vou te amar sempre... 💙</div>
    </div>

    <script>
        // Elementos
        const giftScreen = document.getElementById('giftScreen');
        const loveScreen = document.getElementById('loveScreen');
        const happyScreen = document.getElementById('happyScreen');
        const sadScreen = document.getElementById('sadScreen');
        const giftBox = document.getElementById('giftBox');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const loveText = document.getElementById('loveText');

        // Clica no presente
        giftBox.addEventListener('click', () => {
            giftScreen.style.display = 'none';
            loveScreen.style.display = 'flex';
            
            // Cria corações flutuantes
            createFloatingHearts();
            
            // Animação do texto "Eu te amo"
            loveText.style.animation = 'pulse 1.5s infinite';
        });

        // Botão SIM
        btnYes.addEventListener('click', () => {
            loveScreen.style.display = 'none';
            happyScreen.style.display = 'flex';
            
            // Cria flores dançando
            createDancingFlowers();
        });

        // Botão NÃO
        btnNo.addEventListener('click', () => {
            loveScreen.style.display = 'none';
            sadScreen.style.display = 'flex';
            
            // Cria chuva
            createRain();
        });

        // Função para criar corações flutuantes
        function createFloatingHearts() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '💖';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    heart.style.animationDelay = Math.random() * 2 + 's';
                    loveScreen.appendChild(heart);

                    setTimeout(() => {
                        heart.remove();
                    }, 8000);
                }, i * 200);
            }
        }

        // Função para criar flores dançando
        function createDancingFlowers() {
            const flowers = ['🌸', '🌺', '🌹', '🌻', '🌼'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower';
                    flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                    flower.style.left = Math.random() * 100 + '%';
                    flower.style.top = Math.random() * 100 + '%';
                    flower.style.animationDelay = Math.random() * 2 + 's';
                    happyScreen.appendChild(flower);

                    setTimeout(() => {
                        flower.remove();
                    }, 5000);
                }, i * 150);
            }
        }

        // Função para criar chuva
        function createRain() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.className = 'raindrop';
                    drop.innerHTML = '💧';
                    drop.style.left = Math.random() * 100 + '%';
                    drop.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                    drop.style.animationDelay = Math.random() * 2 + 's';
                    sadScreen.appendChild(drop);

                    setTimeout(() => {
                        drop.remove();
                    }, 3000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
